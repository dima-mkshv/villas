<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Причерноморье — VILLAE ROMANAE</title>
  <meta name="description" content="Греческие колонии и города Боспорского царства Северного Причерноморья — карта объектов с фильтром по эпохам и доступу">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="styles.css?v=26">
</head>
<body class="map-page" data-page="psites" data-region="pontus">
  <header class="site-nav">
    <a class="nav-logo" href="pontus.html">🏛️ <span>VILLAE&nbsp;ROMANAE</span></a>
    <button class="nav-burger" id="nav-burger" aria-label="Menu" aria-haspopup="true">☰</button>
    <nav class="nav-tabs">
      <a href="pontus.html" data-nav="psites" data-i18n-nav="psites"></a>
      <a href="pontus-timeline.html" data-nav="ptimeline" data-i18n-nav="ptimeline"></a>
    </nav>
    <button class="nav-about" data-i18n-nav="about"></button>
    <div class="nav-lang lang-switch" role="group" aria-label="Language">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div id="app">
    <aside id="sidebar">
      <header class="sb-header">
        <p class="sb-subtitle" data-i18n="subtitle"></p>
      </header>

      <section class="sb-controls">
        <input id="search" type="search" autocomplete="off">
        <div class="filter-label" data-i18n="accessLabel"></div>
        <label class="chk acc-chk">
          <input type="checkbox" id="f-tour" checked>
          <span class="chk-mark acc-mark-tour">✓</span>
          <span data-i18n="tourFilter"></span>
        </label>
        <label class="chk acc-chk">
          <input type="checkbox" id="f-closed" checked>
          <span class="chk-mark acc-mark-closed">✓</span>
          <span data-i18n="closedFilter"></span>
        </label>

        <div class="filter-label sig-lbl" data-i18n="sigLabel"></div>
        <div class="sig-filter" id="sig-filter">
          <button class="sig-btn active" type="button" data-min="1" data-i18n="sigAll"></button>
          <button class="sig-btn" type="button" data-min="3">3+</button>
          <button class="sig-btn" type="button" data-min="4">4+</button>
          <button class="sig-btn" type="button" data-min="5">★ 5</button>
        </div>

        <label class="chk acc-chk unesco-chk">
          <input type="checkbox" id="f-unesco">
          <span class="chk-mark acc-mark-unesco">✓</span>
          <span data-i18n="unescoFilter"></span>
        </label>

        <div class="filter-label type-lbl" data-i18n="typeLabel"></div>
        <div class="type-filter" id="type-filter"></div>
      </section>

      <section class="sb-periods">
        <div class="sb-periods-head">
          <span class="filter-label" data-i18n="erasLabel"></span>
          <div class="pf-actions">
            <button class="pf-action" id="pf-all" data-i18n="allEras"></button>
            <button class="pf-action" id="pf-none" data-i18n="clearEras"></button>
          </div>
        </div>
        <div class="period-filter" id="period-filter"></div>
      </section>

      <div class="sb-count" id="count"></div>

      <div id="site-list"></div>

      <footer class="sb-footer" data-i18n="sources"></footer>
    </aside>

    <div id="map"></div>
  </div>

  <button id="sidebar-toggle" aria-label="Фильтры"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg><span data-i18n-nav="filters"></span></button>
  <button id="sidebar-close" aria-label="Скрыть меню"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg></button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="regions/pontus/periods.js?v=26"></script>
  <script src="regions/pontus/sites-data.js?v=26"></script>
  <script src="regions/pontus/images.js?v=26"></script>
  <script src="nav.js?v=26"></script>
  <script src="pontus.js?v=26"></script>
</body>
</html>
